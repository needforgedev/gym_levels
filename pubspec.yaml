name: gym_levels
description: "Level Up IRL — gamified fitness app. Train IRL, earn XP, level up, climb friend leaderboards."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  provider: ^6.1.2

  # Offline-first persistence (Phase 1.1) — raw sqflite, no codegen.
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Socials & Scope B sync (v1.1) — see socials_plan.md.
  # supabase_flutter wraps Postgres + Auth + Realtime. PROJECT_URL +
  # PUBLISHABLE_KEY + PHONE_HASH_SALT arrive via --dart-define at
  # build time (see Makefile + lib/data/supabase/supabase_client.dart);
  # nothing is bundled as an asset. crypto is used by PhoneHasher to
  # SHA-256 the salted phone numbers before push.
  supabase_flutter: ^2.5.0
  crypto: ^3.0.6
  # UUIDv4 generator for the `cloud_id` columns added in v2 of the
  # local schema (see lib/data/schema.dart). Used by SyncEngine when
  # enqueuing pushes for rows that don't have a cloud_id yet.
  uuid: ^4.5.1

  # S4 — contact-match: read the address book, hash phone numbers, send
  # to find_users_by_phone_hashes RPC. flutter_contacts handles the
  # native runtime-permission prompt itself; we still declare the
  # static permission in AndroidManifest + Info.plist.
  # Bumped to 2.x because 1.1.9 force-unwraps a Contacts framework
  # return value that became optional in the iOS 26 SDK — crashes the
  # iOS Runner at app launch (before any Dart code runs).
  flutter_contacts: ^2.0.2
  # share_plus — invite-link share sheet on the empty-state of the
  # Friends Found screen. Native UIActivityViewController on iOS,
  # Intent.ACTION_SEND on Android.
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # In-memory SQLite for unit tests.
  sqflite_common_ffi: ^2.3.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # Note: `.env` is intentionally NOT listed here. Production config
    # arrives via `--dart-define` at build time (see SupabaseConfig).
    # `.env` is only used as a dev fallback by `flutter run` on local
    # machines, where flutter_dotenv reads it from the working directory
    # at runtime — no asset bundling required, and no risk of secrets
    # leaking into a release APK / IPA.
    - assets/hero-character.png
    - assets/hero-bust.png
    - assets/founder-badge.png
    - assets/body-front.png
    # Per-muscle highlight panels — one polished body PNG per muscle group.
    # Front view: chest, shoulders, biceps, core, quads.
    # Back view: lats, traps, triceps, glutes, hamstrings+calves.
    - assets/muscle_images/panel_0_0.jpeg
    - assets/muscle_images/panel_0_1.jpeg
    - assets/muscle_images/panel_0_2.jpeg
    - assets/muscle_images/panel_0_3.jpeg
    - assets/muscle_images/panel_0_4.jpeg
    - assets/muscle_images/panel_1_0.jpeg
    - assets/muscle_images/panel_1_1.jpeg
    - assets/muscle_images/panel_1_2.jpeg
    - assets/muscle_images/panel_1_3.jpeg
    - assets/muscle_images/panel_1_4.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
