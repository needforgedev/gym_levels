<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEVEL UP IRL — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-page: #07050f;
    --bg-app: #0A0612;
    --bg-card: #120A1F;
    --bg-card-2: #1A0F2B;
    --violet: #8B5CF6;
    --violet-soft: #A78BFA;
    --violet-deep: #5B21B6;
    --amber: #F5A623;
    --amber-soft: #FBBF24;
    --streak: #FF6B35;
    --teal: #19E3E3;
    --text: #ECE9F5;
    --text-muted: #8A809B;
    --text-dim: #5A5169;
    --border: rgba(139, 92, 246, 0.18);
    --border-glow: rgba(139, 92, 246, 0.45);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    color: var(--text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }

  /* Page bg with subtle particle-like glow */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 20% 10%, rgba(139, 92, 246, 0.12), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(245, 166, 35, 0.06), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.04), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* scrollbar */
  .scroll::-webkit-scrollbar { width: 0; height: 0; }
  .scroll { scrollbar-width: none; -ms-overflow-style: none; }

  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.25), 0 0 24px -6px rgba(139, 92, 246, 0.35); }
    50% { box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.55), 0 0 32px -4px rgba(139, 92, 246, 0.55); }
  }
  @keyframes flamePulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255, 107, 53, 0.5)); }
    50% { filter: drop-shadow(0 0 14px rgba(255, 107, 53, 0.9)); }
  }
  @keyframes xpFloat {
    0% { transform: translateY(0) scale(0.8); opacity: 0; }
    20% { opacity: 1; transform: translateY(-10px) scale(1.1); }
    100% { transform: translateY(-80px) scale(1); opacity: 0; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes sparkle {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes scanY {
    0% { top: 0%; opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { top: 100%; opacity: 0; }
  }

  .display-font { font-family: 'Bebas Neue', 'Oswald', sans-serif; letter-spacing: 0.04em; }
  .oswald { font-family: 'Oswald', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .fade-in { animation: fadeInUp 0.4s ease-out both; }
</style>
